<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Mon Petit Commerce – Authentification</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-slate-950 text-slate-100">
  <header class="border-b border-slate-800 bg-slate-950/80 backdrop-blur sticky top-0 z-20">
    <div class="mx-auto max-w-6xl px-4 py-3 flex items-center justify-between">
      <a href="index.html" class="flex items-center gap-2">
        <span class="inline-flex h-8 w-8 items-center justify-center rounded-lg bg-emerald-500 text-slate-900 font-bold">M</span>
        <span class="font-semibold tracking-tight">Mon Petit Commerce</span>
      </a>
      <nav class="flex items-center gap-4 text-sm">
        <a href="index.html" class="hover:text-emerald-400 transition-colors">Catalogue</a>
        <a href="cart.html" class="hover:text-emerald-400 transition-colors">Panier</a>
        <a href="admin.html" class="hover:text-emerald-400 transition-colors">Admin</a>
        <span class="text-xs text-slate-500">Auth</span>
      </nav>
    </div>
  </header>

  <main class="mx-auto max-w-6xl px-4 py-10 flex items-center justify-center">
    <div class="w-full max-w-md rounded-2xl border border-slate-800 bg-slate-900/40 p-6 space-y-6">
      <div class="space-y-2 text-center">
        <h1 class="text-2xl font-semibold">Connexion / Inscription</h1>
        <p class="text-sm text-slate-400">
          Créez un compte ou connectez-vous pour passer commande et accéder à l’admin.
        </p>
      </div>

      <div class="flex gap-2 rounded-full bg-slate-900/70 p-1 text-xs">
        <button id="tab-login"
                class="flex-1 rounded-full py-1.5 text-center bg-slate-800 text-slate-100">
          Connexion
        </button>
        <button id="tab-register"
                class="flex-1 rounded-full py-1.5 text-center text-slate-400 hover:text-slate-100">
          Inscription
        </button>
      </div>

      <!-- Formulaire login -->
      <form id="login-form" class="space-y-4">
        <div class="space-y-1 text-sm">
          <label for="login-email" class="block text-slate-300">Email</label>
          <input id="login-email" type="email" required
                 class="w-full rounded-lg border border-slate-700 bg-slate-950/70 px-3 py-2 text-sm focus:outline-none focus:ring-1 focus:ring-emerald-500" />
        </div>
        <div class="space-y-1 text-sm">
          <label for="login-password" class="block text-slate-300">Mot de passe</label>
          <input id="login-password" type="password" required
                 class="w-full rounded-lg border border-slate-700 bg-slate-950/70 px-3 py-2 text-sm focus:outline-none focus:ring-1 focus:ring-emerald-500" />
        </div>
        <button type="submit"
                class="w-full inline-flex items-center justify-center rounded-full bg-emerald-500 px-4 py-2 text-xs font-semibold text-slate-950 hover:bg-emerald-400 transition">
          Se connecter
        </button>
      </form>

      <!-- Formulaire register -->
      <form id="register-form" class="space-y-4 hidden">
        <div class="space-y-1 text-sm">
          <label for="register-email" class="block text-slate-300">Email</label>
          <input id="register-email" type="email" required
                 class="w-full rounded-lg border border-slate-700 bg-slate-950/70 px-3 py-2 text-sm focus:outline-none focus:ring-1 focus:ring-emerald-500" />
        </div>
        <div class="space-y-1 text-sm">
          <label for="register-password" class="block text-slate-300">Mot de passe</label>
          <input id="register-password" type="password" required minlength="6"
                 class="w-full rounded-lg border border-slate-700 bg-slate-950/70 px-3 py-2 text-sm focus:outline-none focus:ring-1 focus:ring-emerald-500" />
          <p class="text-[11px] text-slate-500">6 caractères minimum.</p>
        </div>
        <button type="submit"
                class="w-full inline-flex items-center justify-center rounded-full bg-emerald-500 px-4 py-2 text-xs font-semibold text-slate-950 hover:bg-emerald-400 transition">
          Créer mon compte
        </button>
      </form>

      <div id="auth-message" class="min-h-[1.5rem] text-[11px] text-center text-slate-400"></div>
    </div>
  </main>

  <footer class="border-t border-slate-800 mt-8">
    <div class="mx-auto max-w-6xl px-4 py-4 text-xs text-slate-500 flex items-center justify-between">
      <span>© Mon Petit Commerce</span>
      <span>TP Express + MongoDB</span>
    </div>
  </footer>

  <script src="js/common.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
